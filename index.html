<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dacha Homestyle Cafe — Taste of Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --cream: #F5F1E8;
            --warm-white: #FEFDFB;
            --dark-brown: #4A3F35;
            --medium-brown: #6B5D52;
            --terracotta: oklch(0.62 0.12 35);
            --sage-green: oklch(0.68 0.08 140);
            --light-terracotta: oklch(0.88 0.05 35);
            --light-sage: oklch(0.92 0.03 140);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--warm-white);
            color: var(--dark-brown);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        #root {
            width: 100%;
        }

</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">

const { useState, useEffect, useRef } = React;

// ============ TWEAKS CONFIGURATION ============
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroStyle": "fullBleed",
  "accentColor": "terracotta",
  "navStyle": "floating",
  "showPatterns": true
} /*EDITMODE-END*/;

// ============ MAIN APP ============
function DachaLanding() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [activeSection, setActiveSection] = useState('hero');

  useEffect(() => {
    // Listen for tweak mode messages
    const handleMessage = (e) => {
      if (e.data.type === '__activate_edit_mode') {
        setTweaksVisible(true);
      } else if (e.data.type === '__deactivate_edit_mode') {
        setTweaksVisible(false);
      }
    };

    window.addEventListener('message', handleMessage);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    // Scroll handler
    const handleScroll = () => {
      setScrolled(window.scrollY > 50);

      // Update active section
      const sections = ['hero', 'about', 'menu', 'gallery', 'testimonials', 'catering', 'contact'];
      for (const section of sections) {
        const el = document.getElementById(section);
        if (el) {
          const rect = el.getBoundingClientRect();
          if (rect.top <= 100 && rect.bottom >= 100) {
            setActiveSection(section);
            break;
          }
        }
      }
    };

    window.addEventListener('scroll', handleScroll);

    return () => {
      window.removeEventListener('message', handleMessage);
      window.removeEventListener('scroll', handleScroll);
    };
  }, []);

  const updateTweak = (key, value) => {
    const newTweaks = { ...tweaks, [key]: value };
    setTweaks(newTweaks);
    window.parent.postMessage({
      type: '__edit_mode_set_keys',
      edits: newTweaks
    }, '*');
  };

  const scrollToSection = (id) => {
    const el = document.getElementById(id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };

  return (
    <>
                    <Navigation
        scrolled={scrolled}
        activeSection={activeSection}
        scrollToSection={scrollToSection}
        navStyle={tweaks.navStyle} />
      
                    
                    <HeroSection
        heroStyle={tweaks.heroStyle}
        accentColor={tweaks.accentColor}
        showPatterns={tweaks.showPatterns} />
      
                    
                    <AboutSection accentColor={tweaks.accentColor} />
                    
                    <MenuSection accentColor={tweaks.accentColor} />
                    
                    <GallerySection />
                    
                    <TestimonialsSection accentColor={tweaks.accentColor} />
                    
                    <CateringSection accentColor={tweaks.accentColor} showPatterns={tweaks.showPatterns} />
                    
                    <ContactSection accentColor={tweaks.accentColor} />
                    
                    <Footer />
                    
                    {tweaksVisible &&
      <TweaksPanel
        tweaks={tweaks}
        updateTweak={updateTweak}
        onClose={() => setTweaksVisible(false)} />

      }
                </>);

}

// ============ NAVIGATION ============
function Navigation({ scrolled, activeSection, scrollToSection, navStyle }) {
  const navLinks = [
  { id: 'hero', label: 'Home' },
  { id: 'about', label: 'About' },
  { id: 'menu', label: 'Menu' },
  { id: 'gallery', label: 'Gallery' },
  { id: 'catering', label: 'Catering' },
  { id: 'contact', label: 'Contact' }];


  const navStyles = {
    position: 'fixed',
    top: navStyle === 'floating' ? scrolled ? '20px' : '30px' : 0,
    left: navStyle === 'floating' ? '50%' : 0,
    transform: navStyle === 'floating' ? 'translateX(-50%)' : 'none',
    width: navStyle === 'floating' ? 'auto' : '100%',
    background: scrolled || navStyle === 'fullWidth' ? 'rgba(255, 253, 251, 0.95)' : 'transparent',
    backdropFilter: scrolled || navStyle === 'fullWidth' ? 'blur(10px)' : 'none',
    padding: navStyle === 'floating' ? '16px 40px' : '20px 60px',
    borderRadius: navStyle === 'floating' ? '50px' : 0,
    boxShadow: scrolled || navStyle === 'fullWidth' ? '0 4px 20px rgba(0,0,0,0.08)' : 'none',
    zIndex: 1000,
    transition: 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'space-between',
    gap: '40px'
  };

  return (
    <nav style={navStyles}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', cursor: 'pointer' }} onClick={() => scrollToSection('hero')}>
                        <img src="assets/dacha-logo-new.png" alt="Dacha" style={{ transition: 'height 0.3s', width: "60px", height: "60px" }} />
                    </div>
                    
                    <div style={{ display: 'flex', gap: '32px', alignItems: 'center' }}>
                        {navLinks.map((link) =>
        <a
          key={link.id}
          onClick={(e) => {e.preventDefault();scrollToSection(link.id);}}
          style={{
            color: activeSection === link.id ? 'var(--terracotta)' : 'var(--medium-brown)',
            textDecoration: 'none',
            fontSize: '15px',
            fontWeight: activeSection === link.id ? 600 : 400,
            cursor: 'pointer',
            transition: 'all 0.3s',
            position: 'relative',
            padding: '8px 0'
          }}
          onMouseEnter={(e) => e.target.style.color = 'var(--terracotta)'}
          onMouseLeave={(e) => e.target.style.color = activeSection === link.id ? 'var(--terracotta)' : 'var(--medium-brown)'}>
          
                                {link.label}
                            </a>
        )}
                    </div>
                </nav>);

}

          onClick={() => updateTweak('heroStyle', 'fullBleed')} />
        
                        <TweakButton
          label="Centered"
          active={tweaks.heroStyle === 'centered'}
          onClick={() => updateTweak('heroStyle', 'centered')} />
        
                        <TweakButton
          label="Minimal"
          active={tweaks.heroStyle === 'minimal'}
          onClick={() => updateTweak('heroStyle', 'minimal')} />
        
                    </TweakSection>
                    
                    <TweakSection title="Accent Color">
                        <TweakButton
          label="Terracotta"
          active={tweaks.accentColor === 'terracotta'}
          onClick={() => updateTweak('accentColor', 'terracotta')}
          color="var(--terracotta)" />
        
                        <TweakButton
          label="Sage Green"
          active={tweaks.accentColor === 'sage'}
          onClick={() => updateTweak('accentColor', 'sage')}
          color="var(--sage-green)" />
        
                    </TweakSection>
                    
                    <TweakSection title="Navigation Style">
                        <TweakButton
          label="Floating"
          active={tweaks.navStyle === 'floating'}
          onClick={() => updateTweak('navStyle', 'floating')} />
        
                        <TweakButton
          label="Full Width"
          active={tweaks.navStyle === 'fullWidth'}
          onClick={() => updateTweak('navStyle', 'fullWidth')} />
        
                    </TweakSection>
                    
                    <TweakSection title="Visual Effects">
                        <label style={{
          display: 'flex',
          alignItems: 'center',
          gap: '12px',
          cursor: 'pointer',
          padding: '12px',
          borderRadius: '8px',
          background: tweaks.showPatterns ? 'var(--cream)' : 'transparent',
          transition: 'background 0.2s'
        }}>
                            <input
            type="checkbox"
            checked={tweaks.showPatterns}
            onChange={(e) => updateTweak('showPatterns', e.target.checked)}
            style={{ width: '18px', height: '18px', cursor: 'pointer' }} />
          
                            <span style={{
            fontSize: '15px',
            color: 'var(--dark-brown)'
          }}>Show Patterns</span>
                        </label>
                    </TweakSection>
                </div>);

}

function TweakSection({ title, children }) {
  return (
    <div style={{ marginBottom: '24px' }}>
                    <div style={{
        fontSize: '13px',
        fontWeight: 600,
        textTransform: 'uppercase',
        letterSpacing: '1px',
        color: 'var(--medium-brown)',
        marginBottom: '12px'
      }}>
                        {title}
                    </div>
                    <div style={{
        display: 'flex',
        flexDirection: 'column',
        gap: '8px'
      }}>
                        {children}
                    </div>
                </div>);

}

function TweakButton({ label, active, onClick, color }) {
  return (
    <button
      onClick={onClick}
      style={{
        background: active ? color || 'var(--terracotta)' : 'transparent',
        color: active ? 'white' : 'var(--dark-brown)',
        border: `2px solid ${active ? color || 'var(--terracotta)' : 'var(--cream)'}`,
        padding: '12px 16px',
        fontSize: '15px',
        fontWeight: active ? 600 : 400,
        borderRadius: '8px',
        cursor: 'pointer',
        transition: 'all 0.2s',
        textAlign: 'left'
      }}
      onMouseEnter={(e) => {
        if (!active) {
          e.target.style.background = 'var(--cream)';
        }
      }}
      onMouseLeave={(e) => {
        if (!active) {
          e.target.style.background = 'transparent';
        }
      }}>
      
                    {label}
                </button>);

}

// ============ ANIMATIONS ============
const styleSheet = document.createElement('style');
styleSheet.textContent = `
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            html {
                scroll-behavior: smooth;
            }
        `;
document.head.appendChild(styleSheet);

// ============ RENDER ============
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<DachaLanding />);
</script>
</body>
</html>
